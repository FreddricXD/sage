services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sage
      POSTGRES_PASSWORD: sage
      POSTGRES_DB: sage
    ports:
      - "5434:5432"
    volumes:
      - sage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sage -d sage"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: sage-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - sage_ollama:/root/.ollama

  api:
    build: ./backend
    container_name: sage-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://sage:sage@db:5432/sage
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-3-5-sonnet-latest}
    ports:
      - "8000:8000"

volumes:
  sage_pgdata:
  sage_ollama:
